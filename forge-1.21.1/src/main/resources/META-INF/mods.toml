# Ping to Map: Xaero's edition - Forge 1.21.1 mods.toml
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
displayURL="https://github.com/KURONAMI333/ping-to-map-xaeros"
issueTrackerURL="https://github.com/KURONAMI333/ping-to-map-xaeros/issues"
side="CLIENT"
description='''
${mod_description}
'''

# Mixin 設定 (Ping-Wheel の PingManager.acceptPingPacket をフック)
[[mixins]]
config="${mod_id}.mixins.json"

# ─── 必須依存 ───────────────────────────────────────────────
[[dependencies.${mod_id}]]
    modId="forge"
    type="required"
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Ping-Wheel: Mixin ターゲット (CLIENT)
[[dependencies.${mod_id}]]
    modId="pingwheel"
    type="required"
    versionRange="[0,)"
    ordering="AFTER"
    side="CLIENT"

# Xaero's Minimap / World Map: 依存宣言不要 (Reflection で internal API を直叩き。
# 入っていれば waypoint 即追加、入っていなくても crash しない silent fail)
